opencollection: 1.0.0

info:
  name: Auditoria
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: token
      value: "{{token}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
